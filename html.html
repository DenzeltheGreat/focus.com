<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fokus Translate</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f3f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #4285f4;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
    }
    .container {
      display: flex;
      justify-content: center;
      margin: 30px;
      gap: 20px;
    }
    .box {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      width: 40%;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 150px;
      border: none;
      resize: none;
      font-size: 1em;
    }
    button {
      background: #4285f4;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1em;
    }
    button:hover {
      background: #357ae8;
    }
  </style>
</head>
<body>
  <header>Fokus Translate</header>
  <div class="container">
    <div class="box">
      <h3>English</h3>
      <textarea id="englishInput" placeholder="Type English here..."></textarea>
      <button onclick="translateToFokus()">Translate →</button>
    </div>
    <div class="box">
      <h3>Fokus Language</h3>
      <textarea id="fokusOutput" readonly placeholder="Translation appears here..."></textarea>
    </div>
  </div>
 <a href="https://nofocus.com">Visit NoFocus</a>
  <script>
    const dictionary = {
      "is": "tas",
      "also": "bum",
      "nincompoop": "bruk",
      "stupid": "kuku",
      "pig": "keke",
      "dog": "keke",
      "good": "gruh",
      "a": "kres",
      "to": "vreh",
      "much": "krek",
      "fokus": "brusk",
      "man": "munh",
      "more": "mrusk",
      "go": "gus",
      "please": "bas",
      "babies": "brums",
      "baby": "brum",
      "marry": "mas",
      "will": "wrest",
      "spam": "spres",
      "i": "riss",
      "you": "van",
      "he": "hus",
      "her": "heur",
      "it": "sris",
      "they": "thus",
      "yall": "sup",
      "better": "sius"
      "worser": "suis"
    };

    function translateToFokus() {
      const input = document.getElementById("englishInput").value.toLowerCase();
      const words = input.split(/\s+/);
      const translated = words.map(word => dictionary[word] || word).join(" ");
      document.getElementById("fokusOutput").value = translated;
    }
  </script>
</body>
</html>
