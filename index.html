  margin: 0;
  padding: 40px 20px;
  color: white;
}

header {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 30px;
}

.container {
  display: flex;
  max-width: 1000px;
  margin: auto;
  background: rgba(0,140,255,0.08);
  border-radius: 20px;
  overflow: hidden;
}

.box {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(0,140,255,0.2);
}

.box:last-child {
  border-right: none;
}

h3 {
  margin: 0;
  padding: 15px;
  background: rgba(0,140,255,0.1);
}

textarea {
  flex: 1;
  border: none;
  resize: none;
  padding: 20px;
  font-size: 16px;
  background: transparent;
  color: white;
  outline: none;
}

.controls {
  text-align: center;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #00eaff;
  color: black;
}

#dictionaryPanel {
  display: none;
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
}
</style>
</head>

// ================= BUILD REVERSE =================
const reverseDictionary = {};
for (const [eng,fok] of Object.entries(dictionary)) {
  reverseDictionary[fok.toLowerCase()] = eng;
}


// ================= TOKENIZER =================
function tokenize(text){
  return text.match(/\w+|\s+|[^\w\s]/g) || [];
}


// ================= TRANSLATE =================
function translate(text){
  return tokenize(text)
    .map(t => dictionary[t.toLowerCase()] || t)
    .join("");
}


// ================= REVERSE =================
function reverseTranslate(text){
  return tokenize(text)
    .map(t => reverseDictionary[t.toLowerCase()] || t)
    .join("");
}


// ================= EVENTS =================
let lock=false;

const englishInput=document.getElementById("englishInput");
const fokusOutput=document.getElementById("fokusOutput");

englishInput.addEventListener("input",function(){
  if(lock) return;
  lock=true;
  fokusOutput.value=translate(this.value);
  lock=false;
});

fokusOutput.addEventListener("input",function(){
  if(lock) return;
  lock=true;
  englishInput.value=reverseTranslate(this.value);
  lock=false;
});


// ================= BUTTON =================
function manualTranslate(){
  fokusOutput.value=translate(englishInput.value);
}


// ================= DICTIONARY BUTTON =================
function toggleDictionary(){
  const panel=document.getElementById("dictionaryPanel");

  if(panel.style.display==="block"){
    panel.style.display="none";
    return;
  }

  let html="<h3>Dictionary</h3>";
  for(const [eng,fok] of Object.entries(dictionary)){
    html+="<div>"+eng+" → "+fok+"</div>";
  }

  panel.innerHTML=html;
  panel.style.display="block";
}
