<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AntiFokus Translator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>AntiFokus Translator</header>

<div class="container">

  <div class="box">
    <h3>English</h3>
    <textarea id="englishInput" placeholder="Type English..."></textarea>
  </div>

  <div class="box">
    <h3>AntiFokus</h3>
    <textarea id="fokusOutput" placeholder="AntiFokus output..."></textarea>
  </div>

</div>

<div class="controls">
  <button onclick="manualTranslate()">Translate</button>
  <button onclick="toggleDictionary()">📖 Kamus</button>
</div>

<div id="dictionaryPanel"></div>

<script>

/* ================= DICTIONARY ================= */

const dictionary = {

  "hello":"hais",
  "bye":"urs",

  "i":"riss",
  "you":"van",
  "he":"hus",
  "she":"vash",
  "it":"sris",
  "they":"thus",

  "is":"tas",
  "am":"tas",
  "are":"tas",

  "good":"druk",
  "bad":"krak",
  "very":"drav",

  "the":"pim",
  "a":"kres",
  "and":"drun",
  "but":"su",
  "because":"dravas",

  "like":"lis",
  "love":"luma",
  "hate":"hiss",

  "water":"wata",
  "bread":"rota",

  "ms":"kor",
  "ruth":"perper",
  "saiba":"saiba momoi",
  "laksmi":"smortah"
};

/* ================= REVERSE ================= */

const reverseDictionary = {};
for(const [eng,fok] of Object.entries(dictionary)){
  reverseDictionary[fok.toLowerCase()] = eng;
}

/* ================= TOKEN ================= */

function tokenize(text){
  return text.match(/\w+|\s+|[^\w\s]/g) || [];
}

/* ================= AUTO SYSTEM ================= */

function autoGenerate(word){
  let w = word.toLowerCase();
  if(w.endsWith("s") && w.length>3) return w.slice(0,-1)+"sik";
  if(w.endsWith("ing")) return w.slice(0,-3)+"o";
  if(w.endsWith("ed")) return w.slice(0,-2)+"edr";
  return w+"a";
}

/* ================= TRANSLATE ================= */

function translate(text){
  return tokenize(text)
    .map(t=>{
      let w=t.toLowerCase();
      if(dictionary[w]) return dictionary[w];
      if(!/^[a-z]+$/i.test(t)) return t;
      return autoGenerate(w);
    })
    .join("");
}

function reverseTranslate(text){
  return tokenize(text)
    .map(t=>reverseDictionary[t.toLowerCase()]||t)
    .join("");
}

/* ================= AUTO EVENT ================= */

let lock=false;

const englishInput=document.getElementById("englishInput");
const fokusOutput=document.getElementById("fokusOutput");

englishInput.addEventListener("input",function(){
  if(lock) return;
  lock=true;
  fokusOutput.value=translate(this.value);
  lock=false;
});

fokusOutput.addEventListener("input",function(){
  if(lock) return;
  lock=true;
  englishInput.value=reverseTranslate(this.value);
  lock=false;
});

/* ================= BUTTON ================= */

function manualTranslate(){
  fokusOutput.value=translate(englishInput.value);
}

function toggleDictionary(){

  const panel=document.getElementById("dictionaryPanel");

  if(panel.style.display==="block"){
    panel.style.display="none";
    return;
  }

  let html="";
  for(const [eng,fok] of Object.entries(dictionary)){
    html += `<b>${eng}</b> → ${fok}<br>`;
  }

  panel.innerHTML=html;
  panel.style.display="block";
}

</script>

</body>
</html>
