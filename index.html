<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AntiFokus Translator</title>

<style>
body {
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  margin: 0;
  padding: 40px 20px;
  color: white;
}

header {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 30px;
}

.container {
  display: flex;
  max-width: 1000px;
  margin: auto;
  background: rgba(0,140,255,0.08);
  border-radius: 20px;
  overflow: hidden;
}

.box {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(0,140,255,0.2);
}

.box:last-child {
  border-right: none;
}

h3 {
  margin: 0;
  padding: 15px;
  background: rgba(0,140,255,0.1);
}

textarea {
  flex: 1;
  border: none;
  resize: none;
  padding: 20px;
  font-size: 16px;
  background: transparent;
  color: white;
  outline: none;
}

.controls {
  text-align: center;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #00eaff;
  color: black;
}

#dictionaryPanel {
  display: none;
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
}
</style>
</head>

<body>

<header>AntiFokus Translator</header>

<div class="container">
  <div class="box">
    <h3>English</h3>
    <textarea id="englishInput"></textarea>
  </div>
  <div class="box">
    <h3>AntiFokus</h3>
    <textarea id="fokusOutput"></textarea>
  </div>
</div>

<div class="controls">
  <button onclick="manualTranslate()">Translate</button>
  <button onclick="toggleDictionary()">📖 Dictionary</button>
</div>

<div id="dictionaryPanel"></div>

<script>
  
  // === Reverse Dictionary ===
  const reverseDictionary = {};

  // === Tokenizer ===
  function tokenize(text) {
    return text.match(/\w+|\s+|[^\w\s]/g) || [];
  }

  // === Auto Generate (fallback for unknown words) ===
  function autoGenerate(word) {
    let w = word.toLowerCase();
    if (w.endsWith("s") && w.length > 3) return w.slice(0, -1) + "sik";
    if (w.endsWith("ing")) return w.slice(0, -3) + "o";
    if (w.endsWith("ed")) return w.slice(0, -2) + "edr";
    return w + "a";
  }

  // === Translate Functions ===
  function translate(text) {
    return tokenize(text)
      .map(t => {
        let w = t.toLowerCase();
        if (dictionary && dictionary[w]) return dictionary[w];
        if (!/^[a-z]+$/i.test(t)) return t;
        return autoGenerate(w);
      })
      .join("");
  }

  function reverseTranslate(text) {
    return tokenize(text)
      .map(t => reverseDictionary[t.toLowerCase()] || t)
      .join("");
  }

  // === Event Listeners ===
  let lock = false;
  const englishInput = document.getElementById("englishInput");
  const fokusOutput = document.getElementById("fokusOutput");

  englishInput.addEventListener("input", function() {
    if (lock) return;
    lock = true;
    fokusOutput.value = translate(this.value);
    lock = false;
  });

  fokusOutput.addEventListener("input", function() {
    if (lock) return;
    lock = true;
    englishInput.value = reverseTranslate(this.value);
    lock = false;
  });

  // === Manual Translate Button ===
  function manualTranslate() {
    fokusOutput.value = translate(englishInput.value);
  }

  // === Toggle Dictionary Panel ===
  function toggleDictionary() {
    const panel = document.getElementById("dictionaryPanel");

    if (panel.style.display === "block") {
      panel.style.display = "none";
      return;
    }

    let html = "";
    if (dictionary) {
      for (const [eng, fok] of Object.entries(dictionary)) {
        html += "<div>" + eng + " → " + fok + "</div>";
      }
    }

    panel.innerHTML = html;
    panel.style.display = "block";
  }
</script>

</body>
</html>
